{% extends "base.html" %}

{% block content %}

<div class="p-5 bg-primary text-white rounded shadow">

<h1>⚡ Electronics Inventory Dashboard</h1>

<p>
Manage Products, Sales, Suppliers and Stock.
</p>

</div>

<br>

<div class="row">

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h1>{{products|length}}</h1>

<h5>Total Products</h5>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h1>{{low_stock|length}}</h1>

<h5>Low Stock Alerts</h5>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow">

<div class="card-body text-center">

<h1>{{suppliers|length}}</h1>

<h5>Suppliers</h5>

</div>

</div>

</div>

</div>

{% endblock %}
