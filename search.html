{% extends "base.html" %}

{% block content %}

<form method="GET">

<div class="input-group mb-3">

<input
type="text"
name="query"
class="form-control"
placeholder="Search Product">

<button class="btn btn-primary">
Search
</button>

</div>

</form>

{% if products %}

<table class="table table-striped">

<tr>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
</tr>

{% for p in products %}

<tr>
<td>{{p[1]}}</td>
<td>₹{{p[3]}}</td>
<td>{{p[4]}}</td>
</tr>

{% endfor %}

</table>

{% endif %}

{% endblock %}
