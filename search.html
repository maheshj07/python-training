{% extends 'base.html' %}

{% block title %}Search{% endblock %}

{% block content %}

<div class="card shadow p-4">

<h2>
🔍 Search Results
</h2>

<p>
Search: <strong>{{query}}</strong>
</p>

<table class="table table-striped">

<tr>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
</tr>

{% for p in products %}

<tr>
<td>{{p.name}}</td>
<td>₹{{p.price}}</td>
<td>{{p.stock}}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
