{% extends "base.html" %}

{% block content %}

<div class="card shadow-lg">

<div class="card-header bg-success text-white">

<h2>{{ product.name }}</h2>

</div>

<div class="card-body">

<table class="table table-striped">

<tr>
<th>Product ID</th>
<td>{{ product.id }}</td>
</tr>

<tr>
<th>Product Name</th>
<td>{{ product.name }}</td>
</tr>

<tr>
<th>Price</th>
<td>₹{{ product.price }}</td>
</tr>

<tr>
<th>Available Stock</th>
<td>{{ product.stock }}</td>
</tr>

<tr>
<th>Expiry Date</th>
<td>{{ product.expiry }}</td>
</tr>

<tr>
<th>Description</th>
<td>{{ product.details }}</td>
</tr>

</table>

<div class="mt-3">

<a href="/products" class="btn btn-primary">
Back to Products
</a>

<a href="/" class="btn btn-secondary">
Home
</a>

</div>

</div>

</div>

{% endblock %}
