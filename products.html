{% extends 'base.html' %}{% block content %}
<h2 class="mb-3">Products</h2>
<form class="card card-body shadow-sm mb-4" method="get">
  <div class="row g-3 align-items-end">
    <div class="col-md-4"><label class="form-label">Search</label><input name="q" class="form-control" placeholder="Search product"></div>
    <div class="col-md-3"><label class="form-label">Category</label><select name="category" class="form-select"><option value="">All</option>{% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}</select></div>
    <div class="col-md-2"><label class="form-label">Min Price</label><input name="min_price" type="number" step="0.01" class="form-control"></div>
    <div class="col-md-2"><label class="form-label">Max Price</label><input name="max_price" type="number" step="0.01" class="form-control"></div>
    <div class="col-md-1 d-grid"><button class="btn btn-primary">Go</button></div>
  </div>
</form>
<div class="row g-3">
{% for p in products %}
  <div class="col-md-4">
    <div class="card h-100 shadow-sm">
      <div class="card-body">
        <h5>{{ p.name }}</h5>
        <div class="text-muted">{{ p.category.name }}</div>
        <div>₹{{ '%.2f'|format(p.price) }} / {{ p.unit }}</div>
        <div>Stock: {{ p.stock }}</div>
        <p class="small mt-2">{{ p.description }}</p>
      </div>
    </div>
  </div>
{% else %}
  <p>No products found.</p>
{% endfor %}
</div>
{% endblock %}
