{% extends "base.html" %}

{% block content %}

<h3>Products</h3>

<table class="table table-hover">
    <tr>
        <th>ID</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th>
    </tr>

    {% for p in products %}
    <tr>
        <td>{{p.id}}</td>
        <td>{{p.name}}</td>
        <td>{{p.category}}</td>
        <td>{{p.price}}</td>
        <td>{{p.stock}}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
