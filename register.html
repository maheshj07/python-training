{% extends 'base.html' %}{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <form method="post" class="card card-body shadow-sm">
      <h3 class="mb-3">Register</h3>
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Name</label><input name="name" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Phone</label><input name="phone" class="form-control"></div>
        <div class="col-md-6"><label class="form-label">Email</label><input name="email" type="email" class="form-control" required></div>
        <div class="col-md-6"><label class="form-label">Role</label><select name="role" class="form-select"><option value="customer">Customer</option><option value="shopkeeper">Shopkeeper</option></select></div>
        <div class="col-12"><label class="form-label">Password</label><input name="password" type="password" class="form-control" required></div>
      </div>
      <button class="btn btn-success mt-3">Create Account</button>
    </form>
  </div>
</div>
{% endblock %}
