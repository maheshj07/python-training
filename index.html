{% extends 'base.html' %}

{% block title %}Products{% endblock %}

{% block content %}

<div class="card shadow p-4">

<h2 class="mb-4">
📦 Product Inventory
</h2>

<form action="/search" method="GET" class="row mb-4">

<div class="col-md-10">
<input
type="text"
name="query"
class="form-control"
placeholder="Search Product">
</div>

<div class="col-md-2">
<button class="btn btn-primary w-100">
Search
</button>
</div>

</form>

<form action="/filter" method="GET" class="row mb-4">

<div class="col-md-10">

<select name="category" class="form-select">

<option>Electronics</option>
<option>Accessories</option>
<option>Office</option>

</select>

</div>

<div class="col-md-2">
<button class="btn btn-success w-100">
Filter
</button>
</div>

</form>

<table class="table table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Stock</th>
<th>Category</th>
</tr>

</thead>

<tbody>

{% for p in products %}

<tr>
<td>{{p.id}}</td>
<td>{{p.name}}</td>
<td>₹{{p.price}}</td>
<td>{{p.stock}}</td>
<td>{{p.category}}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
