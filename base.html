<!DOCTYPE html>
<html>
<head>
<title>{% block title %}{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.navbar{
background:#0d6efd;
}

.hero{
background:linear-gradient(135deg,#0d6efd,#4f46e5);
color:white;
padding:80px 20px;
border-radius:20px;
}

.card{
border:none;
border-radius:15px;
}

.footer{
background:#1e293b;
color:white;
padding:15px;
margin-top:50px;
text-align:center;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">

<a class="navbar-brand fw-bold" href="/">
🏪 Mahesh super shop 
</a>

<div>
<a href="/" class="btn btn-light btn-sm">Home</a>
<a href="/products" class="btn btn-warning btn-sm">Products</a>
</div>

</div>
</nav>

<div class="container mt-4">
{% block content %}
{% endblock %}
</div>

<div class="footer">
Smart Inventory System © 2026
</div>

</body>
</html>
